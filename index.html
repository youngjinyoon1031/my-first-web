<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>나만의 첫 웹사이트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(15, 23, 42, 0.92);
      border-radius: 18px;
      padding: 28px 28px 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.15);
      color: #93c5fd;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }
    h1 {
      font-size: 26px;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    h1 span {
      background: linear-gradient(120deg, #60a5fa, #c4b5fd, #f97316);
      -webkit-background-clip: text;
      color: transparent;
    }
    .subtitle {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .feature {
      padding: 12px 12px 11px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(55, 65, 81, 0.75);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      cursor: default;
    }
    .feature:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.85);
      border-color: rgba(96, 165, 250, 0.8);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), rgba(15, 23, 42, 0.98));
    }
    .feature-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #e5e7eb;
    }
    .feature-desc {
      font-size: 12px;
      color: #9ca3af;
    }

counter-card {
      margin: 6px 0 26px;
      padding: 10px 14px 9px;
      border-radius: 14px;
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), rgba(15, 23, 42, 0.98));
      border: 1px solid rgba(55, 65, 81, 0.9);
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 260px;
    }
    .counter-title {
      font-size: 13px;
      font-weight: 600;
      color: #e5e7eb;
    }
    .counter-days {
      font-size: 18px;
      font-weight: 600;
      color: #facc15;
    }

    
    /* 오늘의 날씨 섹션 */
    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      margin-top: 4px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
    }
    .section-caption {
      font-size: 12px;
      color: #9ca3af;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .weather-card {
      border-radius: 14px;
      padding: 12px 12px 10px;
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), rgba(15, 23, 42, 0.98));
      border: 1px solid rgba(55, 65, 81, 0.85);
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 90px;
    }
    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .weather-location {
      font-size: 13px;
      font-weight: 600;
    }
    .weather-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(75, 85, 99, 0.9);
      color: #e5e7eb;
      max-width: 120px;
      text-align: center;
      white-space: nowrap;
    }
    .weather-main-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 2px;
    }
    .weather-temp {
      font-size: 22px;
      font-weight: 600;
    }
    .weather-temp span {
      font-size: 13px;
      color: #9ca3af;
      margin-left: 2px;
    }
    .weather-extra {
      font-size: 11px;
      color: #9ca3af;
      text-align: right;
    }
    .weather-updated {
      font-size: 10px;
      color: #6b7280;
      margin-top: 2px;
    }
    .weather-loading {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .weather-error {
      font-size: 11px;
      color: #fca5a5;
      margin-top: 4px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #6b7280;
      border-top: 1px solid rgba(31, 41, 55, 0.9);
      padding-top: 10px;
      margin-top: 6px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #2563eb;
      color: white;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.55);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.7);
      background: #1d4ed8;
    }
    button.secondary {
      background: transparent;
      color: #9ca3af;
      box-shadow: none;
      border: 1px solid rgba(75, 85, 99, 0.9);
    }
    button.secondary:hover {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(148, 163, 184, 0.9);
      color: #e5e7eb;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #4b5563;
    }
    @media (max-width: 480px) {
      .card {
        padding: 22px 18px 20px;
      }
      h1 {
        font-size: 22px;
      }
      .subtitle {
        font-size: 13px;
      }
      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }

charts-section {
      margin-top: 24px;
    }
    .tradingview-widget-container {
      margin-top: 8px;
      height: 380px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(55, 65, 81, 0.85);
      background: rgba(15, 23, 42, 0.95);
    }
    .tradingview-widget-container__widget {
      height: 100% !important;
    }
    
  </style>
</head>
<body>
  <main class="card">
    
    <h1>
      영진's <span>Website</span>
    </h1>
    <div class="counter-card">
      <div class="counter-title">영똥 ♡ 혠</div>
      <div class="counter-days" id="daysCounter">0일째</div>
    </div>
    
    <!-- 오늘의 날씨 섹션 -->
    <section>
      <div class="section-title-row">
        <div class="section-title">오늘의 날씨</div>
      </div>

      <div class="weather-grid" id="weatherGrid">
        <article class="weather-card" data-location-id="incheon-seo">
          <div class="weather-header">
            <div class="weather-location">인천 서구</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>

        <article class="weather-card" data-location-id="seoul-gangseo">
          <div class="weather-header">
            <div class="weather-location">서울 강서구</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>

        <article class="weather-card" data-location-id="icheon-bubal">
          <div class="weather-header">
            <div class="weather-location">이천시 부발읍</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>

        <article class="weather-card" data-location-id="wonju-dangu">
          <div class="weather-header">
            <div class="weather-location">원주시 단구동</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>
      </div>
    </section>

   <!-- 코인 차트 섹션 -->
    <section class="charts-section">
      <div class="section-title-row">
        <div class="section-title"> 주식/코인 차트</div>
        <div class="section-caption">Bitcoin · Ethereum · Solana (Binance)</div>
      </div>
      <div class="tradingview-widget-container">
        <div id="tradingview_crypto" class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
          new TradingView.widget({
            container_id: "tradingview_crypto",
            autosize: true,
            symbol: "BINANCE:BTCUSDT",
            watchlist: [
              "BINANCE:BTCUSDT",
              "BINANCE:ETHUSDT",
              "BINANCE:SOLUSDT"
            ],
            interval: "60",
            timezone: "Asia/Seoul",
            theme: "dark",
            style: "1",
            locale: "ko",
            toolbar_bg: "rgba(0, 0, 0, 0)",
            enable_publishing: false,
            hide_top_toolbar: false,
            hide_side_toolbar: false,
            allow_symbol_change: true
          });
        </script>
      </div>
    </section>

    
    <div class="footer">
      <div class="btn-row">
        <button id="helloBtn">
          <span>알림 띄우기</span>
        </button>
        <button class="secondary" id="colorBtn">
          <span>배경 색 바꾸기</span>
        </button>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <span class="dot"></span>
        <span>이 파일을 복사해서 마음대로 수정해 보세요.</span>
      </div>
    </div>
  </main>

<script>
  
    function updateDaysCounter() {
      // 기준 날짜: 2025-08-02 (월은 0부터 시작하므로 7이 8월)
      const start = new Date(2025, 7, 2);
      const today = new Date();
      // 시·분·초는 버리고 날짜 기준으로만 계산
      start.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);
      const diffMs = today.getTime() - start.getTime();
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const el = document.getElementById("daysCounter");
      if (!el) return;
      el.textContent = `${diffDays}일째`;
    }


    // 알림 / 배경색 버튼 예제
    const helloBtn = document.getElementById("helloBtn");
    const colorBtn = document.getElementById("colorBtn");
    const body = document.body;
    helloBtn.addEventListener("click", () => {
      alert("안녕하세요! 지금 보고 있는 이 페이지가 당신의 첫 웹사이트 예제입니다 :)");
    });
    const gradients = [
      "linear-gradient(135deg, #0f172a, #1e293b)",
      "linear-gradient(135deg, #1d1b3a, #312e81)",
      "linear-gradient(135deg, #111827, #064e3b)",
      "linear-gradient(135deg, #020617, #4c1d95)"
    ];
    let index = 0;
    colorBtn.addEventListener("click", () => {
      index = (index + 1) % gradients.length;
      body.style.background = gradients[index];
    });
    // ===== OpenWeather API를 이용한 오늘의 날씨 =====
    // 1) 여기에 본인 OpenWeather API 키를 넣어주세요.
    //    예: const API_KEY = "abcd1234....";
    const API_KEY = "cacbfd85a4029b80be1a0d13fcf12c32";
  // 2) 조회할 위치 목록 (위도, 경도는 대략적인 값)
    const LOCATIONS = [
      {
        id: "incheon-seo",
        name: "인천 서구",
        lat: 37.545,
        lon: 126.675
      },
      {
        id: "seoul-gangseo",
        name: "서울 강서구",
        lat: 37.561,
        lon: 126.822
      },
      {
        id: "icheon-bubal",
        name: "이천시 부발읍",
        lat: 37.272,
        lon: 127.484
      },
      {
        id: "wonju-dangu",
        name: "원주시 단구동",
        lat: 37.335,
        lon: 127.943
      }
    ];
    function formatUpdatedTime(date) {
      const h = date.getHours().toString().padStart(2, "0");
      const m = date.getMinutes().toString().padStart(2, "0");
      return `${h}:${m} 기준`;
    }
    // 날씨 상태(맑음, 비, 눈 등)에 따라 이모지 선택
    function getWeatherEmoji(main) {
      switch (main) {
        case "Clear":
          return "☀️";
        case "Clouds":
          return "☁️";
        case "Rain":
          return "🌧";
        case "Drizzle":
          return "🌦";
        case "Thunderstorm":
          return "⛈";
        case "Snow":
          return "❄️";
        case "Mist":
        case "Fog":
        case "Haze":
        case "Smoke":
        case "Dust":
        case "Sand":
          return "🌫";
        default:
          return "🌡️";
      }
    }
    async function fetchWeatherForLocation(location) {
      const card = document.querySelector(
        `.weather-card[data-location-id="${location.id}"]`
      );
      if (!card) return;
      const statusEl = card.querySelector('[data-role="status"]');
      const tempEl = card.querySelector('[data-role="temp"]');
      const extraEl = card.querySelector('[data-role="extra"]');
      const updatedEl = card.querySelector('[data-role="updated"]');
      statusEl.textContent = "불러오는 중…";
      updatedEl.textContent = "";
      try {
        const url =
          `https://api.openweathermap.org/data/2.5/weather?lat=${location.lat}&lon=${location.lon}` +
          `&appid=${API_KEY}&units=metric&lang=kr`;
        const res = await fetch(url);
        const data = await res.json(); // 항상 JSON 먼저 파싱
        if (!res.ok) {
          const msg = data && data.message ? data.message : `HTTP ${res.status}`;
          statusEl.classList.add("weather-error");
          statusEl.textContent = `오류: ${msg}`;
          tempEl.innerHTML = `-<span>°C</span>`;
          extraEl.innerHTML = `체감온도 -°C<br />습도 -%`;
          updatedEl.textContent = "API 오류";
          return;
        }
        const weatherObj = data.weather && data.weather[0] ? data.weather[0] : null;
        const main = weatherObj ? weatherObj.main : "";
        const description = weatherObj ? weatherObj.description : "정보 없음";
        const emoji = getWeatherEmoji(main);
        const temp = data.main ? Math.round(data.main.temp) : null;
        const feelsLike = data.main ? Math.round(data.main.feels_like) : null;
        const humidity = data.main ? data.main.humidity : null;
        statusEl.classList.remove("weather-error");
        // 👉 이모지 + 설명(예: "☀️ 맑음")
        statusEl.textContent = `${emoji} ${description}`;
        tempEl.innerHTML = `${temp}<span>°C</span>`;
        extraEl.innerHTML =
          `체감온도 ${feelsLike !== null ? feelsLike + "°C" : "-°C"}<br />` +
          `습도 ${humidity !== null ? humidity + "%" : "-%"}`;
        updatedEl.textContent = formatUpdatedTime(new Date());
      } catch (error) {
        console.error("날씨 불러오기 오류:", error);
        statusEl.classList.add("weather-error");
        statusEl.textContent = "네트워크 오류";
        updatedEl.textContent = "다시 시도해 주세요";
      }
    }
    function loadAllWeather() {
      if (!API_KEY) {
        const cards = document.querySelectorAll(".weather-card");
        cards.forEach(card => {
          const statusEl = card.querySelector('[data-role="status"]');
          const updatedEl = card.querySelector('[data-role="updated"]');
          statusEl.textContent = "API 키 필요";
          updatedEl.textContent = "OpenWeather API 키를 설정해 주세요";
        });
        return;
      }
      LOCATIONS.forEach(loc => {
        fetchWeatherForLocation(loc);
      });
    }
      // 페이지가 로드되면 날짜 카운터 + 날씨 불러오기
    window.addEventListener("load", () => {
      updateDaysCounter();
      loadAllWeather();
    });
  </script>
    
</body>
</html>
