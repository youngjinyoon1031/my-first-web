<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>나만의 첫 웹사이트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(15, 23, 42, 0.92);
      border-radius: 18px;
      padding: 28px 28px 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.15);
      color: #93c5fd;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }
    h1 {
      font-size: 26px;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    h1 span {
      background: linear-gradient(120deg, #60a5fa, #c4b5fd, #f97316);
      -webkit-background-clip: text;
      color: transparent;
    }
    .subtitle {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .feature {
      padding: 12px 12px 11px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(55, 65, 81, 0.75);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      cursor: default;
    }
    .feature:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.85);
      border-color: rgba(96, 165, 250, 0.8);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), rgba(15, 23, 42, 0.98));
    }
    .feature-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #e5e7eb;
    }
    .feature-desc {
      font-size: 12px;
      color: #9ca3af;
    }

    /* 오늘의 날씨 섹션 */
    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      margin-top: 4px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
    }
    .section-caption {
      font-size: 12px;
      color: #9ca3af;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .weather-card {
      border-radius: 14px;
      padding: 12px 12px 10px;
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), rgba(15, 23, 42, 0.98));
      border: 1px solid rgba(55, 65, 81, 0.85);
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 90px;
    }
    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .weather-location {
      font-size: 13px;
      font-weight: 600;
    }
    .weather-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(75, 85, 99, 0.9);
      color: #e5e7eb;
      max-width: 80px;
      text-align: center;
      white-space: nowrap;
    }
    .weather-main-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 2px;
    }
    .weather-temp {
      font-size: 22px;
      font-weight: 600;
    }
    .weather-temp span {
      font-size: 13px;
      color: #9ca3af;
      margin-left: 2px;
    }
    .weather-extra {
      font-size: 11px;
      color: #9ca3af;
      text-align: right;
    }
    .weather-updated {
      font-size: 10px;
      color: #6b7280;
      margin-top: 2px;
    }
    .weather-loading {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .weather-error {
      font-size: 11px;
      color: #fca5a5;
      margin-top: 4px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #6b7280;
      border-top: 1px solid rgba(31, 41, 55, 0.9);
      padding-top: 10px;
      margin-top: 6px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #2563eb;
      color: white;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.55);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.7);
      background: #1d4ed8;
    }
    button.secondary {
      background: transparent;
      color: #9ca3af;
      box-shadow: none;
      border: 1px solid rgba(75, 85, 99, 0.9);
    }
    button.secondary:hover {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(148, 163, 184, 0.9);
      color: #e5e7eb;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #4b5563;
    }
    @media (max-width: 480px) {
      .card {
        padding: 22px 18px 20px;
      }
      h1 {
        font-size: 22px;
      }
      .subtitle {
        font-size: 13px;
      }
      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">
      <span class="badge-dot"></span>
      <span>My First Web</span>
    </div>

    <h1>
      안녕, 나는 <span>나만의 웹사이트</span><br />
      지금 이 파일이 바로 시작이야.
    </h1>

    <!-- 오늘의 날씨 섹션 -->
    <section>
      <div class="section-title-row">
        <div class="section-title">오늘의 날씨</div>
        <div class="section-caption">인천 서구 · 서울 강서구 · 이천시 부발읍 · 원주시 단구동</div>
      </div>

      <div class="weather-grid" id="weatherGrid">
        <article class="weather-card" data-location-id="incheon-seo">
          <div class="weather-header">
            <div class="weather-location">인천 서구</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>

        <article class="weather-card" data-location-id="seoul-gangseo">
          <div class="weather-header">
            <div class="weather-location">서울 강서구</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>

        <article class="weather-card" data-location-id="icheon-bubal">
          <div class="weather-header">
            <div class="weather-location">이천시 부발읍</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>

        <article class="weather-card" data-location-id="wonju-dangu">
          <div class="weather-header">
            <div class="weather-location">원주시 단구동</div>
            <div class="weather-status" data-role="status">로딩중…</div>
          </div>
          <div class="weather-main-row">
            <div class="weather-temp" data-role="temp">-<span>°C</span></div>
            <div class="weather-extra" data-role="extra">
              체감온도 -°C<br />
              습도 -%
            </div>
          </div>
          <div class="weather-updated" data-role="updated">업데이트 준비중</div>
        </article>
      </div>
    </section>

    <div class="footer">
      <div class="btn-row">
        <button id="helloBtn">
          <span>알림 띄우기</span>
        </button>
        <button class="secondary" id="colorBtn">
          <span>배경 색 바꾸기</span>
        </button>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <span class="dot"></span>
        <span>이 파일을 복사해서 마음대로 수정해 보세요.</span>
      </div>
    </div>
  </main>

  <script>
    // 알림 / 배경색 버튼 예제
    const helloBtn = document.getElementById("helloBtn");
    const colorBtn = document.getElementById("colorBtn");
    const body = document.body;

    helloBtn.addEventListener("click", () => {
      alert("안녕하세요! 지금 보고 있는 이 페이지가 당신의 첫 웹사이트 예제입니다 :)");
    });

    const gradients = [
      "linear-gradient(135deg, #0f172a, #1e293b)",
      "linear-gradient(135deg, #1d1b3a, #312e81)",
      "linear-gradient(135deg, #111827, #064e3b)",
      "linear-gradient(135deg, #020617, #4c1d95)"
    ];
    let index = 0;

    colorBtn.addEventListener("click", () => {
      index = (index + 1) % gradients.length;
      body.style.background = gradients[index];
    });

    // ===== OpenWeather API를 이용한 오늘의 날씨 =====
    // 1) 여기에 본인 OpenWeather API 키를 넣어주세요.
    //    예: const API_KEY = "abcd1234....";
    const API_KEY = "2202f424e6cbad93e2b21c75fa080b98";

    // 2) 조회할 위치 목록 (위도, 경도는 대략적인 값)
    const LOCATIONS = [
      {
        id: "incheon-seo",
        name: "인천 서구",
        lat: 37.545,
        lon: 126.675
      },
      {
        id: "seoul-gangseo",
        name: "서울 강서구",
        lat: 37.561,
        lon: 126.822
      },
      {
        id: "icheon-bubal",
        name: "이천시 부발읍",
        lat: 37.272,
        lon: 127.484
      },
      {
        id: "wonju-dangu",
        name: "원주시 단구동",
        lat: 37.335,
        lon: 127.943
      }
    ];

    function formatUpdatedTime(date) {
      const h = date.getHours().toString().padStart(2, "0");
      const m = date.getMinutes().toString().padStart(2, "0");
      return `${h}:${m} 기준`;
    }

    async function fetchWeatherForLocation(location) {
  const card = document.querySelector(
    `.weather-card[data-location-id="${location.id}"]`
  );
  if (!card) return;

  const statusEl = card.querySelector('[data-role="status"]');
  const tempEl = card.querySelector('[data-role="temp"]');
  const extraEl = card.querySelector('[data-role="extra"]');
  const updatedEl = card.querySelector('[data-role="updated"]');

  statusEl.textContent = "불러오는 중…";
  updatedEl.textContent = "";

  try {
    const url =
      `https://api.openweathermap.org/data/2.5/weather?lat=${location.lat}&lon=${location.lon}` +
      `&appid=${API_KEY}&units=metric&lang=kr`;

    const res = await fetch(url);
    const data = await res.json(); // 항상 JSON 먼저 파싱

    if (!res.ok) {
      // OpenWeather가 준 에러 메시지를 그대로 보여주기
      const msg = data && data.message ? data.message : `HTTP ${res.status}`;
      statusEl.classList.add("weather-error");
      statusEl.textContent = `오류: ${msg}`;
      tempEl.innerHTML = `-<span>°C</span>`;
      extraEl.innerHTML = `체감온도 -°C<br />습도 -%`;
      updatedEl.textContent = "API 오류";
      return;
    }

    const description = data.weather && data.weather[0] ? data.weather[0].description : "정보 없음";
    const temp = data.main ? Math.round(data.main.temp) : null;
    const feelsLike = data.main ? Math.round(data.main.feels_like) : null;
    const humidity = data.main ? data.main.humidity : null;

    statusEl.classList.remove("weather-error");
    statusEl.textContent = description;
    tempEl.innerHTML = `${temp}<span>°C</span>`;
    extraEl.innerHTML =
      `체감온도 ${feelsLike !== null ? feelsLike + "°C" : "-°C"}<br />` +
      `습도 ${humidity !== null ? humidity + "%" : "-%"}`;
    updatedEl.textContent = formatUpdatedTime(new Date());
  } catch (error) {
    console.error("날씨 불러오기 오류:", error);
    statusEl.classList.add("weather-error");
    statusEl.textContent = "네트워크 오류";
    updatedEl.textContent = "다시 시도해 주세요";
  }
}

function loadAllWeather() {
  // API 키가 비어 있지만 않으면 바로 호출
  if (!API_KEY) {
    const cards = document.querySelectorAll(".weather-card");
    cards.forEach(card => {
      const statusEl = card.querySelector('[data-role="status"]');
      const updatedEl = card.querySelector('[data-role="updated"]');
      statusEl.textContent = "API 키 필요";
      updatedEl.textContent = "OpenWeather API 키를 설정해 주세요";
    });
    return;
  }

  LOCATIONS.forEach(loc => {
    fetchWeatherForLocation(loc);
  });
}

    // 페이지가 로드되면 자동으로 날씨 불러오기
    window.addEventListener("load", loadAllWeather);
  </script>
</body>
</html>
